<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>maze generation</title>
    <script type="module" src="./index.ts"></script>
    <style>
      html {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          avenir next,
          avenir,
          segoe ui,
          helvetica neue,
          Adwaita Sans,
          Cantarell,
          Ubuntu,
          roboto,
          noto,
          helvetica,
          arial,
          sans-serif;
      }
      #controls {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 8px;
      }
      #engine {
        display: flex;
      }
      #engine label {
        padding: 6px 16px;
        cursor: pointer;
        border: 1px solid #ccc;
        font-size: 13px;
        user-select: none;
      }
      #engine label:first-child {
        border-radius: 4px 0 0 4px;
      }
      #engine label:last-child {
        border-radius: 0 4px 4px 0;
        border-left: none;
      }
      #engine input {
        display: none;
      }
      #engine label:has(input:checked) {
        background: #333;
        color: #fff;
        border-color: #333;
      }
      #sizes {
        display: flex;
        gap: 6px;
      }
      #sizes button {
        padding: 6px 14px;
        cursor: pointer;
      }
      #log-wrapper {
        position: relative;
        margin-bottom: 8px;
      }
      #log {
        height: 4lh;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 8px;
        font-family: monospace;
        font-size: 13px;
        background: #f8f8f8;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }
      #clear-log {
        position: absolute;
        top: 4px;
        right: 4px;
        cursor: pointer;
        padding: 6px 14px;
      }
    </style>
  </head>
  <body>
    <h1>maze generation - wasm vs js</h1>
    <div id="controls">
      <div id="engine">
        <label
          ><input type="radio" name="engine" value="WASM" checked /><span
            >WASM</span
          ></label
        >
        <label
          ><input type="radio" name="engine" value="JS" /><span>JS</span></label
        >
      </div>
      <span>size:</span>
      <div id="sizes"></div>
    </div>
    <p>
      sources: <a href="maze.c">maze.c</a>
      <a href="maze.ts.txt">maze.ts</a>
      <a href="https://github.com/onsclom/maze-generation">full project</a>
    </p>
    <div id="log-wrapper">
      <button id="clear-log">clear</button>
      <div id="log"></div>
    </div>
    <canvas id="maze"></canvas>
  </body>
</html>
